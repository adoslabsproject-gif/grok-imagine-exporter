<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>Grok Imagine Exporter</h1>
  <p class="hint">Scarica i tuoi media generati su Grok nella cartella Download.</p>

  <label class="folder">
    Cartella di destinazione
    <input id="folder" type="text" value="GrokExport" />
  </label>

  <button id="openGallery" class="gallery-btn">🖼️ Apri galleria — sfoglia &amp; seleziona</button>
  <p class="ghint">griglia di foto → clicca una foto → vedi i suoi video annidati → scegli cosa scaricare</p>

  <p class="sep">— oppure scarica TUTTO senza scegliere —</p>

  <div class="buttons">
    <button data-job="videos">🎬 Tutti i video generati</button>
    <button data-job="images">🖼️ Tutte le immagini generate</button>
  </div>

  <div class="bar"><div id="fill"></div></div>
  <p id="status">Pronto.</p>

  <div class="footer">
    <button id="cancel" class="ghost">Ferma</button>
    <button id="reset" class="ghost">Azzera memoria</button>
  </div>
</body>
<script src="popup.js"></script>
</html>
